services:
  - type: web
    name: tuitionflow-simulation
    runtime: docker
    plan: starter
    healthCheckPath: /health/ready
    preDeployCommand: corepack pnpm --filter @tuitionflow/api exec prisma migrate deploy
    envVars:
      - key: NODE_ENV
        value: production
      - key: XRPL_ENABLED
        value: 'false'
      - key: PERSISTENCE
        value: prisma
      - key: PRIVATE_STORAGE
        value: local
      - key: LOCAL_STORAGE_ROOT
        value: /app/.data/private
      - key: DATABASE_URL
        fromDatabase:
          name: tuitionflow-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: PARTNER_WEBHOOK_HMAC_SECRET
        generateValue: true
    disk:
      name: tuitionflow-synthetic-data
      mountPath: /app/.data
      sizeGB: 1

databases:
  - name: tuitionflow-postgres
    plan: basic-256mb
    databaseName: tuitionflow
    user: tuitionflow
